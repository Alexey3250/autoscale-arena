apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-arena-worker
  labels:
    app: autoscale-arena-worker
    app.kubernetes.io/part-of: autoscale-arena
    app.kubernetes.io/component: worker
spec:
  # HPA owns this count at runtime; start at 1 so the stack boots cheaply.
  replicas: 1
  selector:
    matchLabels:
      app: autoscale-arena-worker
  template:
    metadata:
      labels:
        app: autoscale-arena-worker
        app.kubernetes.io/part-of: autoscale-arena
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: autoscale-arena-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: WORKER_MODE
              value: "true"
            - name: NODE_ENV
              value: "production"
          resources:
            # Requests drive the HPA target signal; keep them small so a
            # single request noticeably spikes utilisation.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-arena-worker
  labels:
    app: autoscale-arena-worker
    app.kubernetes.io/part-of: autoscale-arena
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app: autoscale-arena-worker
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
