apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-arena-worker
  labels:
    app: autoscale-arena-worker
    app.kubernetes.io/part-of: autoscale-arena
    app.kubernetes.io/component: worker
  annotations:
    # OpenShift ImageChange trigger: rolls the worker pods automatically
    # whenever the shared autoscale-arena-frontend ImageStreamTag advances
    # (i.e. after every BuildConfig run). Without this the Deployment would
    # stay pinned to the SHA that was current when first applied.
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"autoscale-arena-frontend:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"worker\")].image"}]
spec:
  # HPA owns this count at runtime; start at 1 so the stack boots cheaply.
  replicas: 1
  selector:
    matchLabels:
      app: autoscale-arena-worker
  template:
    metadata:
      labels:
        app: autoscale-arena-worker
        app.kubernetes.io/part-of: autoscale-arena
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: autoscale-arena-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: WORKER_MODE
              value: "true"
            - name: NODE_ENV
              value: "production"
          resources:
            # Requests drive the HPA target signal; keep them small so a
            # single request noticeably spikes utilisation.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          # CPU-bound workers can briefly stall the event loop between
          # yield points under heavy load. Liveness is intentionally lenient:
          # it only restarts a pod that's been unresponsive for >2.5 minutes
          # (initial 30s + 5 × 30s). Readiness above stays aggressive — that's
          # the one that gates traffic during startup and momentary stalls.
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-arena-worker
  labels:
    app: autoscale-arena-worker
    app.kubernetes.io/part-of: autoscale-arena
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  selector:
    app: autoscale-arena-worker
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
