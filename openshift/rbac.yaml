apiVersion: v1
kind: ServiceAccount
metadata:
  name: autoscale-arena-frontend
  labels:
    app.kubernetes.io/part-of: autoscale-arena
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoscale-arena-pod-watcher
  labels:
    app.kubernetes.io/part-of: autoscale-arena
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoscale-arena-frontend-pod-watcher
  labels:
    app.kubernetes.io/part-of: autoscale-arena
subjects:
  - kind: ServiceAccount
    name: autoscale-arena-frontend
roleRef:
  kind: Role
  name: autoscale-arena-pod-watcher
  apiGroup: rbac.authorization.k8s.io
